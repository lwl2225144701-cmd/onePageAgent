  <rect width="2400" height="1500" fill="#fafafa"/>
  <text x="1200" y="58" text-anchor="middle" class="title">AI 智能排版手账 APP —— 部署架构图</text>
  <text x="1200" y="96" text-anchor="middle" class="sub">从 MVP 单机部署 到 生产级高并发部署演进｜Python 技术栈｜异步任务｜AI 模型服务</text>

  <!-- left panel MVP -->
  <rect x="45" y="145" width="1090" height="1120" rx="16" class="green"/>
  <text x="590" y="195" text-anchor="middle" class="panel-title" fill="#1b5e20">阶段一：MVP 单机部署（快速验证）</text>
  <text x="590" y="230" text-anchor="middle" class="small">适合早期验证：一台云服务器即可，成本低，部署简单</text>

  <!-- MVP user + frontend -->
  <text x="110" y="330" font-size="70" fill="#16233a">♙</text>
  <text x="112" y="370" class="box-text">用户</text>
  <path d="M165 320 L235 320" class="greenArrow"/>

  <rect x="250" y="270" width="360" height="105" rx="8" class="whitebox"/>
  <text x="430" y="305" text-anchor="middle" class="box-title">Web 前端（Next.js）</text>
  <text x="430" y="335" text-anchor="middle" class="box-text">静态资源打包</text>
  <text x="430" y="363" text-anchor="middle" class="box-text">Konva 可编辑画布</text>

  <path d="M610 320 L720 320" class="greenArrow"/>
  <rect x="740" y="270" width="330" height="105" rx="8" class="soft" stroke-dasharray="8 6"/>
  <text x="905" y="305" text-anchor="middle" class="box-title">前端导出（本地完成）</text>
  <text x="905" y="335" text-anchor="middle" class="box-text">导出 PNG / JPEG</text>
  <text x="905" y="363" text-anchor="middle" class="box-text">导出 PDF</text>

  <!-- MVP nginx -->
  <path d="M430 375 L430 425" class="arrow"/>
  <rect x="120" y="425" width="760" height="105" rx="8" class="whitebox"/>
  <text x="500" y="462" text-anchor="middle" class="box-title">Nginx</text>
  <text x="500" y="492" text-anchor="middle" class="box-text">反向代理 / HTTPS / 静态资源服务 / 简单限流</text>

  <!-- MVP app service section -->
  <path d="M500 530 L500 585" class="arrow"/>
  <rect x="80" y="585" width="980" height="240" rx="12" fill="#f3fff3" stroke="#81c784" stroke-width="2"/>
  <text x="110" y="625" class="panel-title" fill="#1b5e20">应用服务（一台服务器）</text>


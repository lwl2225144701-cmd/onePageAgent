  <rect x="1345" y="928" width="200" height="55" rx="6" class="whitebox"/><text x="1445" y="963" text-anchor="middle" class="box-text">SenseVoiceSmall</text>
  <rect x="1570" y="928" width="160" height="55" rx="6" class="whitebox"/><text x="1650" y="963" text-anchor="middle" class="box-text">Qwen-VL</text>

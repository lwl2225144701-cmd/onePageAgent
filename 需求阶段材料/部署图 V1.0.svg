  <rect x="1345" y="728" width="120" height="55" rx="6" class="whitebox"/><text x="1405" y="763" text-anchor="middle" class="box-text">voice_queue</text>
  <rect x="1480" y="728" width="120" height="55" rx="6" class="whitebox"/><text x="1540" y="763" text-anchor="middle" class="box-text">image_queue</text>

  <text x="220" y="770" text-anchor="middle" class="box-text">SSE 推送</text>

  <rect x="345" y="650" width="220" height="130" rx="8" class="whitebox"/>
  <text x="455" y="684" text-anchor="middle" class="box-title">Celery Worker</text>
  <text x="455" y="714" text-anchor="middle" class="box-text">异步任务处理</text>
  <text x="455" y="742" text-anchor="middle" class="box-text">队列消费</text>
  <text x="455" y="770" text-anchor="middle" class="box-text">定时任务</text>

  <rect x="585" y="650" width="210" height="130" rx="8" class="whitebox"/>
  <text x="690" y="684" text-anchor="middle" class="box-title">Redis</text>
  <text x="690" y="714" text-anchor="middle" class="box-text">Broker</text>

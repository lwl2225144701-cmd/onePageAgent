<?xml version="1.0" encoding="UTF-8"?>
<svg width="2400" height="1500" viewBox="0 0 2400 1500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 44px "Arial", "Microsoft YaHei", sans-serif; fill:#16233a; }
      .sub { font: 400 24px "Arial", "Microsoft YaHei", sans-serif; fill:#53616f; }
      .panel-title { font: 700 30px "Arial", "Microsoft YaHei", sans-serif; }
      .section-title { font: 700 25px "Arial", "Microsoft YaHei", sans-serif; fill:#fff; }
      .box-title { font: 700 22px "Arial", "Microsoft YaHei", sans-serif; fill:#172033; }
      .box-text { font: 400 18px "Arial", "Microsoft YaHei", sans-serif; fill:#263445; }
      .small { font: 400 16px "Arial", "Microsoft YaHei", sans-serif; fill:#4c5968; }
      .tiny { font: 400 14px "Arial", "Microsoft YaHei", sans-serif; fill:#52606d; }
      .note { font: 500 20px "Arial", "Microsoft YaHei", sans-serif; fill:#2d3748; }
      .green { fill:#eaf7ea; stroke:#2e7d32; stroke-width:3; }
      .blue { fill:#eef6ff; stroke:#1976d2; stroke-width:3; }
      .cyan { fill:#e8fbff; stroke:#0097a7; stroke-width:3; }
      .orange { fill:#fff4e6; stroke:#fb8c00; stroke-width:3; }
      .purple { fill:#f5edff; stroke:#8e24aa; stroke-width:3; }
      .gray { fill:#f4f6f8; stroke:#455a64; stroke-width:3; }
      .red { fill:#fff1f1; stroke:#e53935; stroke-width:2.5; }
      .whitebox { fill:#ffffff; stroke:#b7c1cc; stroke-width:2; }
      .soft { fill:#ffffff; stroke:#9fb3c8; stroke-width:1.8; }
      .arrow { stroke:#455a64; stroke-width:3; marker-end:url(#arrow); fill:none; }
      .greenArrow { stroke:#2e7d32; stroke-width:3; marker-end:url(#arrowGreen); fill:none; }
      .orangeArrow { stroke:#fb8c00; stroke-width:4; marker-end:url(#arrowOrange); fill:none; }
      .dash { stroke-dasharray:10 8; }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 Z" fill="#455a64"/>
    </marker>
    <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 Z" fill="#2e7d32"/>
    </marker>
    <marker id="arrowOrange" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 Z" fill="#fb8c00"/>
    </marker>
    <linearGradient id="secGreen" x1="0" x2="1"><stop offset="0" stop-color="#2e7d32"/><stop offset="1" stop-color="#43a047"/></linearGradient>
    <linearGradient id="secBlue" x1="0" x2="1"><stop offset="0" stop-color="#1976d2"/><stop offset="1" stop-color="#42a5f5"/></linearGradient>
    <linearGradient id="secCyan" x1="0" x2="1"><stop offset="0" stop-color="#00838f"/><stop offset="1" stop-color="#00acc1"/></linearGradient>
    <linearGradient id="secOrange" x1="0" x2="1"><stop offset="0" stop-color="#ef6c00"/><stop offset="1" stop-color="#fb8c00"/></linearGradient>
    <linearGradient id="secPurple" x1="0" x2="1"><stop offset="0" stop-color="#6a1b9a"/><stop offset="1" stop-color="#8e24aa"/></linearGradient>
    <linearGradient id="secGray" x1="0" x2="1"><stop offset="0" stop-color="#37474f"/><stop offset="1" stop-color="#607d8b"/></linearGradient>
